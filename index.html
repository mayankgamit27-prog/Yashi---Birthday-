<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Yashi ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      overflow:hidden;
    }

    .card{
      background:rgba(255,255,255,0.15);
      padding:30px;
      border-radius:20px;
      backdrop-filter:blur(10px);
      box-shadow:0 0 25px rgba(0,0,0,.2);
    }

    h1{
      font-size:40px;
      margin-bottom:15px;
    }

    p{
      font-size:20px;
      margin-bottom:20px;
    }

    button{
      background:white;
      color:#ff4081;
      border:none;
      padding:15px 30px;
      border-radius:30px;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      transform:scale(1.05);
    }
  </style>
</head>

<body>

<div class="card">
<h1>🎂 HAPPY BIRTHDAY YASHI 🤍🌷</h1>

<p>From Mayank ❤️</p>

<button onclick="alert('Surprise is Coming ❤️')">
Open Surprise
</button>

</div>

</body>
  </html>
