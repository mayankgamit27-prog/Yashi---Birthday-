<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Yashi 🤍🌷</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9ec4,#ffc9de);
text-align:center;
overflow:hidden;
color:white;
}

.container{
padding:40px 20px;
}

h1{
font-size:42px;
animation: glow 2s infinite;
}

@keyframes glow{
50%{transform:scale(1.08);}
}

img{
width:250px;
height:330px;
object-fit:cover;
border-radius:20px;
margin:10px;
box-shadow:0 0 20px rgba(255,255,255,.6);
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:40px;
background:white;
color:#ff4081;
cursor:pointer;
}

#gallery{
display:none;
}

#msg{
display:none;
font-size:22px;
padding:20px;
}

.heart{
position:fixed;
color:red;
animation:up 6s linear infinite;
}

@keyframes up{
0%{transform:translateY(100vh);}
100%{transform:translateY(-100px);}
}
</style>

</head>

<body>

<div class="container">

<h1>🎂 HAPPY BIRTHDAY YASHI 🤍🌷</h1>

<p>From ❤️ Mayank</p>

<button onclick="show()">Open My Surprise</button>

<div id="gallery">

<br><br>

<img src="IMG-20250506-WA0006.jpg">
  
<img src="Screenshot_2026_0722_220635.png">
  
<img src="Snapchat-1425763364.jpg">

</div>

<div id="msg">

<h2>💌</h2>

<p>

Happy Birthday Yashi 🤍🌷

<br><br>

May your smile always stay beautiful.

May all your dreams come true.

Thank you for coming into my life.

You are very special.

❤️ Forever Yours ❤️

<br><br>

<b>— Mayank</b>

</p>

</div>

</div>

<script>

function show(){

document.getElementById("gallery").style.display="block";

document.getElementById("msg").style.display="block";

}

setInterval(function(){

let h=document.createElement("div");

h.innerHTML="❤️";

h.className="heart";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

},300);

</script>

</body>
</html>
